name: Build, Test & Coverage - Distributed Order Platform

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore all projects
        run: dotnet restore SportsSln.sln

      - name: Build entire solution
        run: dotnet build SportsSln.sln --no-restore -c Release

      - name: Run SportsStore unit tests with coverage
        run: >
          dotnet test SportsStore.Tests/SportsStore.Tests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=sportsstore-results.trx"
          --results-directory ./TestResults

      - name: Run Integration tests with coverage
        run: >
          dotnet test Integration.Tests/Integration.Tests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML coverage report
        run: |
          export PATH="$PATH:~/.dotnet/tools"
          reportgenerator \
            -reports:**/coverage.cobertura.xml \
            -targetdir:coveragereport \
            -reporttypes:"Html;Cobertura;MarkdownSummaryGithub" \
            -title:"SportsStore Distributed Platform"

      - name: Print coverage summary
        run: |
          export PATH="$PATH:~/.dotnet/tools"
          cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coveragereport

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coveragereport

  deploy-coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
